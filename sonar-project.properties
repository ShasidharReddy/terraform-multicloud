# SonarQube Project Configuration
# Terraform Multi-Cloud Infrastructure
sonar.projectKey=terraform-multicloud
sonar.projectName=Terraform Multi-Cloud Infrastructure
sonar.projectVersion=1.0.2

# Source configuration
sonar.sources=.
sonar.inclusions=**/*.tf,**/*.tfvars,**/*.sh,**/*.groovy
sonar.exclusions=**/.terraform/**,**/node_modules/**,**/.git/**,**/logs/**

# Language hints
sonar.sourceEncoding=UTF-8

# SonarQube server (override with -Dsonar.host.url= or env var SONAR_HOST_URL)
# sonar.host.url=http://localhost:9000

# Shell script analysis
sonar.sh.file.suffixes=.sh

# Coverage / reports
sonar.junit.reportPaths=tfsec-report.xml

# SCM
sonar.scm.provider=git
